workflows:
  android-build:
    name: Kamus Jepang Android Build
    max_build_duration: 60

    environment:
      node: 22
      java: 17

    scripts:
      - npm install
      - npx cap sync android
      - chmod +x android/gradlew
      - android/gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk